services:
  postgres:
    image: postgres:15
    container_name: velazco_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velazco-back
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  postgrest:
    image: postgrest/postgrest
    container_name: velazco_postgrest
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@postgres:5432/velazco-back
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgres
    depends_on:
      - postgres
    restart: always

  backend:
    build: .
    container_name: velazco_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/velazco-back
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_SQL_INIT_MODE: always
      SPRING_SQL_INIT_CONTINUE_ON_ERROR: "true"
    env_file:
      - .env
    depends_on:
      - postgres
    restart: always

volumes:
  postgres_data:
